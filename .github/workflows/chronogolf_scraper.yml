name: Chronogolf Course Scraper
on:
  schedule:
    - cron: "0 7 1 * *"
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install selenium webdriver-manager pandas

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Run scraper
        run: |
          mkdir -p output
          python scraper/chronogolf_scraper.py

      - name: Upload CSV as artifact
        uses: actions/upload-artifact@v4
        with:
          name: chronogolf_courses
          path: output/chronogolf_courses.csv
          retention-days: 7
